<html>
  <head>
    <title>Position</title>
    <style>
      .one {
        background-color: pink;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
        /* positions(imp)
            static: set by default(default position).
            relative: moving box from the original position relatively.
            fixed: position is fixed even if scroll down or up.
            absolute: 
            sticky: */
        position: static; /* default position ,no need to set top and left*/
        top: 200px;
        left: 200px;
      }
      .two {
        background-color: green;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
        /* position: relative;
        top: 100px;
        left: 100px; */
      }
      .three {
        background-color: blue;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
        /*position: fixed;
        left: 200px; */
      }
      .four {
        background-color: yellow;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
        position: sticky;
        top: 20px;
      }
      .five {
        background-color: maroon;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
      }
      .six {
        background-color: aqua;
        width: 800px;
        height: 150;
        font-size: 100px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
  </body>
</html>
