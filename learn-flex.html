<!-- flex box: it is to design in one dimension-->
<html>
  <head>
    <title>Flex</title>
    <style>
      .main {
        height: 500px;
        border: 2px solid blue;
        display: flex; /* one dimention(single line)*/
        flex-direction: row-reverse; /*(3-2-1)*/
        /* justify-content: space-between; /* space between each box */
        /* justify-content: space-around; */
        justify-content: space-evenly;
        /* align-items: center; */
        align-items: end;
        flex-wrap: wrap;
      }
      .one {
        width: 100px;
        height: 100px;
        background-color: aquamarine;
        font-size: 30px;
        text-align: center;
        border: 2px solid black;
      }
      .two {
        width: 100px;
        height: 100px;
        background-color: blueviolet;
        font-size: 30px;
        text-align: center;
        border: 2px solid black;
      }
      .three {
        width: 100px;
        height: 100px;
        background-color: brown;
        font-size: 30px;
        text-align: center;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">one</div>
      <div class="two">two</div>
      <div class="three">three</div>
    </div>
  </body>
</html>
